<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Suivi Qualités & Horizons</title>
<style>
:root {
  --spirituel:#7c3aed; --spirituel-l:#ede9fe;
  --professionnel:#059669; --professionnel-l:#d1fae5;
  --social:#dc2626; --social-l:#fee2e2;
  --personnel:#2563eb; --personnel-l:#dbeafe;
  --bg:#f8f7f4; --surface:#ffffff; --text:#1a1a18; --muted:#6b6b67;
  --border:rgba(0,0,0,0.09); --radius:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1c1c1a;--text:#f0efe8;--muted:#8a8a84;--border:rgba(255,255,255,0.09);
  --spirituel-l:#2e1a5e;--professionnel-l:#064e35;--social-l:#4c0c0c;--personnel-l:#0c2a6e;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;height:54px}
.nav-brand{font-size:14px;font-weight:700}
.nav-tabs{display:flex;gap:3px}
.nav-tab{padding:6px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer}
.nav-tab.active{background:var(--text);color:var(--bg)}
.page{display:none;padding:1rem;max-width:520px;margin:0 auto}
.page.active{display:block}
#page-dashboard{max-width:700px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a18;color:#f0efe8;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-color-scheme:dark){.toast{background:#f0efe8;color:#1a1a18}}

/* SAISIE */
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.day-label{font-size:16px;font-weight:600}
.day-btns{display:flex;gap:5px}
.btn-sm{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:13px;color:var(--text)}
.btn-sm:disabled{opacity:.35;cursor:default}
.horizon-block{margin-bottom:1.1rem}
.h-header{display:flex;align-items:center;gap:7px;padding:.35rem .7rem;border-radius:8px;margin-bottom:.5rem}
.h-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.h-name{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.h-vision{font-size:10px;opacity:.65;font-style:italic;margin-left:auto;max-width:52%;text-align:right;line-height:1.3}
.quality-block{margin-bottom:.6rem}
.quality-title{display:flex;align-items:center;justify-content:space-between;padding:.55rem .8rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:2px}
.quality-title-name{font-size:13px;font-weight:600}
.quality-score{font-size:12px;font-weight:700;padding:2px 8px;border-radius:20px}
.arrow{font-size:11px;color:var(--muted);margin-left:6px;transition:transform .2s;display:inline-block}
.arrow.open{transform:rotate(90deg)}
.components-list{display:flex;flex-direction:column;gap:5px;padding:0 2px 4px}
.comp-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:.6rem .8rem;transition:all .15s}
.comp-row.state-ok{border-color:#6ee7b7;background:#d1fae5}
.comp-row.state-ko{border-color:#fca5a5;background:#fee2e2}
.comp-row.state-skip{border-color:#a78bfa;background:#ede9fe;opacity:.7}
.comp-row.state-archived{background:var(--bg);opacity:.55}
@media(prefers-color-scheme:dark){
  .comp-row.state-ok{border-color:#065f46;background:#064e35}
  .comp-row.state-ko{border-color:#7f1d1d;background:#450a0a}
  .comp-row.state-skip{border-color:#4c1d95;background:#2e1a5e}
}
.comp-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;font-weight:700}
.comp-row.state-ok .comp-check{background:#059669;border-color:#059669;color:#fff}
.comp-row.state-ko .comp-check{background:#dc2626;border-color:#dc2626;color:#fff}
.comp-row.state-skip .comp-check{background:#7c3aed;border-color:#7c3aed;color:#fff}
.comp-info{flex:1;cursor:pointer}
.comp-name{font-size:13px;font-weight:500}
.comp-row.state-ok .comp-name{color:#065f46}
.comp-row.state-ko .comp-name{color:#7f1d1d}
.comp-row.state-skip .comp-name{color:#6d28d9}
@media(prefers-color-scheme:dark){
  .comp-row.state-ok .comp-name{color:#6ee7b7}
  .comp-row.state-ko .comp-name{color:#fca5a5}
  .comp-row.state-skip .comp-name{color:#a78bfa}
}
.comp-archived-badge{font-size:9px;background:var(--border);color:var(--muted);border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}
.comp-desc{font-size:11px;color:var(--muted);margin-top:2px;display:none;line-height:1.4}
.comp-desc.open{display:block}
.comp-actions{display:flex;gap:4px;flex-shrink:0}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:2px 5px;border-radius:5px}
.btn-icon:hover{background:var(--border)}
.archived-section{margin-top:4px}
.archived-toggle{background:transparent;border:none;cursor:pointer;font-size:11px;color:var(--muted);padding:4px 2px;display:flex;align-items:center;gap:4px}
.add-comp-btn{display:flex;align-items:center;gap:6px;padding:.4rem .5rem;cursor:pointer;color:var(--muted);font-size:12px;border-radius:8px;margin-top:3px;background:transparent;border:none;width:100%;text-align:left}
.add-comp-btn:hover{background:var(--surface)}
.save-area{margin-top:1.25rem}
.btn-save{width:100%;padding:13px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer}
.day-total{text-align:center;font-size:12px;color:var(--muted);margin-top:6px}
.day-indicator{width:10px;height:10px;border-radius:50%;display:inline-block;margin-left:8px;vertical-align:middle}
.day-indicator.saved{background:#059669}
.day-indicator.unsaved{background:var(--border);border:1px solid var(--muted)}

/* MINI CAL */
.cal-toggle{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;color:var(--muted)}
.mini-cal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;margin-bottom:1rem}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.cal-month-label{font-size:13px;font-weight:600}
.cal-nav-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;color:var(--muted);text-align:center;padding-bottom:3px;font-weight:500}
.cal-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;border:1px solid transparent}
.cal-day.empty{cursor:default}
.cal-day.future{opacity:.3;cursor:default}
.cal-day.is-today{border-color:var(--muted)}
.cal-day.is-current{border-color:var(--text);font-weight:700}
.cal-day.has-data{background:#d1fae5;color:#065f46}
.cal-day.no-data{background:var(--bg)}
.cal-day.no-data:hover{background:var(--border)}
@media(prefers-color-scheme:dark){.cal-day.has-data{background:#064e35;color:#6ee7b7}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:1.25rem 1rem 2rem;width:100%;max-width:520px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.modal input,.modal textarea{width:100%;padding:.65rem .8rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;margin-bottom:.75rem;font-family:inherit}
.modal textarea{min-height:70px;resize:vertical}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-confirm{background:var(--text);color:var(--bg)}
.btn-cancel-modal{background:transparent;color:var(--muted);border:1px solid var(--border) !important}
.btn-danger-modal{background:#dc2626;color:#fff}

/* DASHBOARD */
.dash-controls{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.dash-controls label{font-size:12px;color:var(--muted)}
.dash-controls input[type=number]{width:58px;padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:13px;text-align:center}
.btn-refresh{padding:6px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;cursor:pointer}
.dash-section{margin-bottom:1.5rem}
.dash-section-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:360px){.dash-grid{grid-template-columns:repeat(2,1fr)}}
.dash-card{border-radius:var(--radius);padding:.875rem .75rem;border:2px solid transparent;cursor:pointer}
.dash-card-name{font-size:11px;font-weight:600;margin-bottom:5px;line-height:1.3}
.dash-card-pct{font-size:28px;font-weight:700;line-height:1;margin-bottom:2px}
.dash-card-sub{font-size:10px;opacity:.7}
.dash-card-detail{display:none;margin-top:.5rem;border-top:1px solid rgba(0,0,0,.1);padding-top:.4rem}
.dash-card-detail.open{display:block}
.comp-detail-row{font-size:10px;display:flex;justify-content:space-between;margin-bottom:2px}

/* HEBDO */
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:.75rem}
.week-card-title{font-size:12px;font-weight:600;margin-bottom:.6rem}
.week-bars{display:flex;gap:4px;align-items:flex-end;height:60px}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.week-bar-col{flex:1;width:100%;display:flex;align-items:flex-end}
.week-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}
.week-bar-label{font-size:9px;color:var(--muted)}
.week-bar-pct{font-size:9px;font-weight:600}
.loading{text-align:center;padding:2rem;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<nav>
  <div class="nav-brand">Qualités & Horizons</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('saisie',this)">Saisie</button>
    <button class="nav-tab" onclick="showPage('dashboard',this)">Dashboard</button>
    <button class="nav-tab" onclick="showPage('hebdo',this)">Hebdo</button>
  </div>
</nav>

<div id="page-saisie" class="page active"></div>
<div id="page-dashboard" class="page"></div>
<div id="page-hebdo" class="page"></div>

<!-- Modal composante -->
<div class="modal-overlay hidden" id="modal-comp">
  <div class="modal">
    <div class="modal-title" id="modal-comp-title">Composante</div>
    <input type="text" id="modal-comp-name" placeholder="Nom" />
    <textarea id="modal-comp-desc" placeholder="Description (optionnel)"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeModalComp()">Annuler</button>
      <button class="btn-confirm" onclick="saveModalComp()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal confirmation suppression -->
<div class="modal-overlay hidden" id="modal-delete">
  <div class="modal">
    <div class="modal-title">Confirmer la suppression</div>
    <p id="modal-delete-msg" style="font-size:14px;color:var(--muted);margin-bottom:1rem;line-height:1.5"></p>
    <div class="modal-btns">
      <button class="btn-cancel-modal" onclick="closeModalDelete()">Annuler</button>
      <button class="btn-danger-modal" id="modal-delete-confirm">Supprimer</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
var SUPABASE_URL = 'https://gzfliakogbmuvwurwqfy.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6ZmxpYWtvZ2JtdXZ3dXJ3cWZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjQ5NTMsImV4cCI6MjA5ODE0MDk1M30.35aNfS9uS1oCxvhk-6Tgg9wi93hGzU10bBBN4-Lz1KM';

var HORIZONS = [
  {id:'spirituel',label:'Spirituel',cssVar:'--spirituel',bgVar:'--spirituel-l',
   vision:'I am living in a World of Love, Joy and Peace of God',
   qualities:['Rester Conscient','Être droit','Contribuer dans la société']},
  {id:'professionnel',label:'Professionnel',cssVar:'--professionnel',bgVar:'--professionnel-l',
   vision:'I am giving perfect services for a perfect Pay',
   qualities:['Apprendre de nouvelles compétences','Donner un service de qualité','Avoir un revenu']},
  {id:'social',label:'Social',cssVar:'--social',bgVar:'--social-l',
   vision:'I am sharing life with beautiful spirits',
   qualities:['Prendre soins de ma petite famille','Prendre soins de ma grande famille','Garder une bonne relation avec amis et proches']},
  {id:'personnel',label:'Personnel',cssVar:'--personnel',bgVar:'--personnel-l',
   vision:'I am living in perfect life conditions and perfect life style',
   qualities:['Prendre soins de mon corps','Vivre avec confort','Faire des activités de loisirs']}
];
var ALL_QUALITIES = HORIZONS.flatMap(function(h){return h.qualities;});

// State
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var currentOffset = 0;
var dayChecked = {};
var openQualities = {};   // {qualityName: bool}
var openDescs = {};       // {compId: bool}
var openArchived = {};    // {qualityName: bool}
var calOpen = false;
var calViewYear = new Date().getFullYear();
var calViewMonth = new Date().getMonth();
var savedDates = {};
var dashDays = 30;
var weekDays = 7;
var openDashCards = {};

// COMPONENTS: {qualityName: [{id, name, desc, archived, archivedAt}]}
var COMPONENTS = {};
ALL_QUALITIES.forEach(function(q){
  COMPONENTS[q] = [
    {id:uid(), name:'A', desc:'', archived:false, archivedAt:null},
    {id:uid(), name:'B', desc:'', archived:false, archivedAt:null}
  ];
});

// Modal state
var modalCompCallback = null;
var modalDeleteCallback = null;

// ── UTILS ──
function uid(){ return Math.random().toString(36).slice(2,9); }
function dStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr(){ return dStr(new Date()); }
function addDays(s,n){ var d=new Date(s+'T00:00:00'); d.setDate(d.getDate()+n); return dStr(d); }
function dateStr(offset){ var d=new Date(); d.setDate(d.getDate()+offset); return dStr(d); }
function dateFR(offset){
  var d=new Date(); d.setDate(d.getDate()+offset);
  var s=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function lsGet(k){ try{return JSON.parse(localStorage.getItem(k));}catch{return null;} }
function lsSet(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch{} }

// ── TOAST ──
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.classList.remove('show');},2800);
}

// ── GRADIENT ──
function lerp(a,b,t){return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];}
function grad(p){
  var t=p/100, r=[220,38,38], o=[234,88,12], g=[5,150,105], rgb;
  if(t<=0.5) rgb=lerp(r,o,t*2); else rgb=lerp(o,g,(t-0.5)*2);
  return 'rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')';
}
function gradBg(p){
  var t=p/100, r=[220,38,38], o=[234,88,12], g=[5,150,105], rgb;
  if(t<=0.5) rgb=lerp(r,o,t*2); else rgb=lerp(o,g,(t-0.5)*2);
  var dk=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  return 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(dk?0.25:0.13)+')';
}

// ── SCORE ──
// États: true=OK(100%), 'ko'=KO(0%), 'skip'=exclu, false/undefined=vide=KO(0%)
function qualityScore(qName, checks){
  var comps = (COMPONENTS[qName]||[]).filter(function(c){return !c.archived;});
  if(!comps.length) return null;
  var active = comps.filter(function(c){return checks[c.id]!=='skip';});
  if(!active.length) return null;
  var ok = active.filter(function(c){return checks[c.id]===true;}).length;
  return Math.round((ok/active.length)*100);
}
function stateClass(val){
  if(val===true) return 'state-ok';
  if(val==='ko') return 'state-ko';
  if(val==='skip') return 'state-skip';
  return '';
}
function stateIcon(val){
  if(val===true) return '✓';
  if(val==='ko') return '✗';
  if(val==='skip') return '⊘';
  return '';
}

// ── INIT ──
(async function init(){
  // Clean empty localStorage days
  for(var i=localStorage.length-1;i>=0;i--){
    var k=localStorage.key(i);
    if(k&&k.startsWith('day:')){
      var v=lsGet(k);
      if(!v||!Object.values(v).some(function(x){return x===true;})) localStorage.removeItem(k);
    }
  }
  var stored=lsGet('components');
  if(stored) COMPONENTS=stored;
  await syncComponents();
  await loadDay();
  await loadSavedDates();
  renderSaisie();
})();

async function syncComponents(){
  var res=await sb.from('components_config').select('*').maybeSingle();
  if(res.data&&res.data.config){
    COMPONENTS=res.data.config;
    lsSet('components',COMPONENTS);
  } else {
    await sb.from('components_config').upsert({id:1,config:COMPONENTS},{onConflict:'id'});
    lsSet('components',COMPONENTS);
  }
}
async function saveComponents(){
  lsSet('components',COMPONENTS);
  await sb.from('components_config').upsert({id:1,config:COMPONENTS},{onConflict:'id'});
}

// ── BACKFILL ──
async function backfillSkipAll(compId){
  var today=todayStr();
  var res=await sb.from('suivi_jours').select('date,checks').lt('date',today);
  if(!res.data) return;
  for(var i=0;i<res.data.length;i++){
    var row=res.data[i]; var checks=row.checks||{};
    if(!(compId in checks)){ checks[compId]='skip'; await sb.from('suivi_jours').update({checks:checks}).eq('date',row.date); }
  }
}
async function backfillSkipRange(compId,fromDate,toDate){
  var res=await sb.from('suivi_jours').select('date,checks').gte('date',fromDate).lte('date',toDate);
  if(!res.data) return;
  for(var i=0;i<res.data.length;i++){
    var row=res.data[i]; var checks=row.checks||{};
    checks[compId]='skip';
    await sb.from('suivi_jours').update({checks:checks}).eq('date',row.date);
  }
}

// ── LOAD DAY ──
async function loadDay(){
  dayChecked={};
  var res=await sb.from('suivi_jours').select('*').eq('date',dateStr(currentOffset)).maybeSingle();
  if(res.data&&res.data.checks) dayChecked=res.data.checks;
  var hasTrue=Object.values(dayChecked).some(function(v){return v===true;});
  if(hasTrue) savedDates[dateStr(currentOffset)]=true;
  else delete savedDates[dateStr(currentOffset)];
}

async function loadSavedDates(){
  var start=new Date(calViewYear,calViewMonth-1,1);
  var end=new Date(calViewYear,calViewMonth+2,0);
  var res=await sb.from('suivi_jours').select('date,checks').gte('date',dStr(start)).lte('date',dStr(end));
  if(res.data) res.data.forEach(function(r){
    var hasTrue=Object.values(r.checks||{}).some(function(v){return v===true;});
    if(hasTrue) savedDates[r.date]=true; else delete savedDates[r.date];
  });
}

// ── SAVE DAY ──
async function saveDay(){
  var date=dateStr(currentOffset);
  lsSet('day:'+date,dayChecked);
  var existing=await sb.from('suivi_jours').select('date').eq('date',date).maybeSingle();
  var isUpdate=!!(existing.data);
  var res=await sb.from('suivi_jours').upsert({date:date,checks:dayChecked},{onConflict:'date'});
  if(res.error){ showToast('Erreur enregistrement'); return; }
  var hasTrue=Object.values(dayChecked).some(function(v){return v===true;});
  if(hasTrue) savedDates[date]=true; else delete savedDates[date];
  showToast(isUpdate?'Journée mise à jour ✓':'Journée enregistrée ✓');
  renderSaisie();
}

// ── TOGGLE COMPOSANTE — cycle: vide→ok→ko→skip→vide ──
function toggleComp(compId){
  var cur=dayChecked[compId];
  if(!cur||cur===false) dayChecked[compId]=true;
  else if(cur===true) dayChecked[compId]='ko';
  else if(cur==='ko') dayChecked[compId]='skip';
  else dayChecked[compId]=false;
  renderSaisie();
}

// ── TOGGLE QUALITE ──
function toggleQuality(qName){
  openQualities[qName]=!openQualities[qName];
  renderSaisie();
}

// ── TOGGLE DESC ──
function toggleDesc(compId){
  openDescs[compId]=!openDescs[compId];
  renderSaisie();
}

// ── TOGGLE ARCHIVED SECTION ──
function toggleArchivedSection(qName){
  openArchived[qName]=!openArchived[qName];
  renderSaisie();
}

// ── ARCHIVE / UNARCHIVE ──
function archiveComp(qName, compId){
  var comps=COMPONENTS[qName]||[];
  var comp=null;
  for(var i=0;i<comps.length;i++){ if(comps[i].id===compId){comp=comps[i];break;} }
  if(!comp) return;
  comp.archived=true;
  comp.archivedAt=todayStr();
  saveComponents().then(function(){ renderSaisie(); });
}

function unarchiveComp(qName, compId){
  var comps=COMPONENTS[qName]||[];
  var comp=null;
  for(var i=0;i<comps.length;i++){ if(comps[i].id===compId){comp=comps[i];break;} }
  if(!comp||!comp.archived) return;
  var archivedAt=comp.archivedAt;
  comp.archived=false;
  comp.archivedAt=null;
  saveComponents().then(function(){
    if(archivedAt){
      var yesterday=addDays(todayStr(),-1);
      if(archivedAt<=yesterday) backfillSkipRange(compId,archivedAt,yesterday);
    }
    renderSaisie();
  });
}

// ── EDIT COMP ──
function editComp(qName, compId){
  var comps=COMPONENTS[qName]||[];
  var comp=null;
  for(var i=0;i<comps.length;i++){ if(comps[i].id===compId){comp=comps[i];break;} }
  if(!comp) return;
  document.getElementById('modal-comp-title').textContent='Modifier';
  document.getElementById('modal-comp-name').value=comp.name;
  document.getElementById('modal-comp-desc').value=comp.desc||'';
  modalCompCallback=function(name,desc){
    comp.name=name; comp.desc=desc;
    saveComponents().then(function(){renderSaisie();});
  };
  document.getElementById('modal-comp').classList.remove('hidden');
  setTimeout(function(){document.getElementById('modal-comp-name').focus();},100);
}

// ── ADD COMP ──
function addComp(qName){
  document.getElementById('modal-comp-title').textContent='Nouvelle composante';
  document.getElementById('modal-comp-name').value='';
  document.getElementById('modal-comp-desc').value='';
  modalCompCallback=function(name,desc){
    var newId=uid();
    if(!COMPONENTS[qName]) COMPONENTS[qName]=[];
    COMPONENTS[qName].push({id:newId,name:name,desc:desc,archived:false,archivedAt:null});
    saveComponents().then(function(){
      backfillSkipAll(newId).then(function(){renderSaisie();});
    });
  };
  document.getElementById('modal-comp').classList.remove('hidden');
  setTimeout(function(){document.getElementById('modal-comp-name').focus();},100);
}

function closeModalComp(){ document.getElementById('modal-comp').classList.add('hidden'); modalCompCallback=null; }
function saveModalComp(){
  var name=(document.getElementById('modal-comp-name').value||'').trim();
  var desc=(document.getElementById('modal-comp-desc').value||'').trim();
  if(!name) return;
  if(modalCompCallback) modalCompCallback(name,desc);
  closeModalComp();
}

// ── DELETE COMP ──
function deleteComp(qName, compId){
  document.getElementById('modal-delete-msg').textContent='Supprimer définitivement cette composante ? L\'historique des scores sera impacté.';
  modalDeleteCallback=function(){
    COMPONENTS[qName]=(COMPONENTS[qName]||[]).filter(function(c){return c.id!==compId;});
    saveComponents().then(function(){renderSaisie();});
  };
  document.getElementById('modal-delete-confirm').onclick=function(){
    closeModalDelete();
    if(modalDeleteCallback) modalDeleteCallback();
  };
  document.getElementById('modal-delete').classList.remove('hidden');
}
function closeModalDelete(){ document.getElementById('modal-delete').classList.add('hidden'); modalDeleteCallback=null; }

// ── NAVIGATION ──
async function nav(d){ currentOffset=Math.min(0,currentOffset+d); await loadDay(); renderSaisie(); }
async function goToday(){ currentOffset=0; await loadDay(); renderSaisie(); }

// ── CALENDRIER ──
function toggleCal(){ calOpen=!calOpen; if(calOpen) loadSavedDates().then(renderSaisie); else renderSaisie(); }
function calPrev(){ calViewMonth--; if(calViewMonth<0){calViewMonth=11;calViewYear--;} loadSavedDates().then(renderSaisie); }
function calNext(){ calViewMonth++; if(calViewMonth>11){calViewMonth=0;calViewYear++;} loadSavedDates().then(renderSaisie); }
function calGoDay(ds){
  var today=new Date();today.setHours(0,0,0,0);
  var target=new Date(ds+'T00:00:00');
  if(target>today) return;
  var diff=Math.round((target-today)/(1000*60*60*24));
  currentOffset=diff;
  loadDay().then(renderSaisie);
}

function renderMiniCal(){
  if(!calOpen) return '';
  var months=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  var dows=['L','M','M','J','V','S','D'];
  var today=new Date();today.setHours(0,0,0,0);
  var firstDay=new Date(calViewYear,calViewMonth,1);
  var lastDay=new Date(calViewYear,calViewMonth+1,0);
  var startDow=(firstDay.getDay()+6)%7;
  var currentDate=dateStr(currentOffset);
  var h='<div class="mini-cal"><div class="cal-header">';
  h+='<button class="cal-nav-btn" onclick="calPrev()">&#8592;</button>';
  h+='<div class="cal-month-label">'+months[calViewMonth]+' '+calViewYear+'</div>';
  h+='<button class="cal-nav-btn" onclick="calNext()">&#8594;</button>';
  h+='</div><div class="cal-grid">';
  dows.forEach(function(d){h+='<div class="cal-dow">'+d+'</div>';});
  for(var i=0;i<startDow;i++) h+='<div class="cal-day empty"></div>';
  for(var d=1;d<=lastDay.getDate();d++){
    var dt=new Date(calViewYear,calViewMonth,d);dt.setHours(0,0,0,0);
    var dtStr=dStr(dt);
    var isFuture=dt>today, isToday=dt.getTime()===today.getTime(), isCurrent=dtStr===currentDate;
    var cls='cal-day';
    if(isFuture) cls+=' future';
    else if(savedDates[dtStr]) cls+=' has-data';
    else cls+=' no-data';
    if(isToday) cls+=' is-today';
    if(isCurrent) cls+=' is-current';
    h+='<div class="'+cls+'" '+(isFuture?'':'onclick="calGoDay(\''+dtStr+'\')"')+'>'+d+'</div>';
  }
  h+='</div></div>';
  return h;
}

// ── RENDER SAISIE ──
function renderSaisie(){
  var today=todayStr();
  var currentDay=dateStr(currentOffset);
  var totalComps=0, okComps=0;
  ALL_QUALITIES.forEach(function(q){
    (COMPONENTS[q]||[]).filter(function(c){return !c.archived;}).forEach(function(c){
      totalComps++;
      if(dayChecked[c.id]===true) okComps++;
    });
  });

  var isSaved=!!savedDates[currentDay];
  var h='<div class="day-nav"><div class="day-label">'+dateFR(currentOffset);
  h+='<span class="day-indicator '+(isSaved?'saved':'unsaved')+'"></span></div>';
  h+='<div class="day-btns">';
  h+='<button class="btn-sm" onclick="nav(-1)">&#8592;</button>';
  h+='<button class="btn-sm" onclick="goToday()">Auj.</button>';
  h+='<button class="btn-sm" '+(currentOffset>=0?'disabled':'')+' onclick="nav(1)">&#8594;</button>';
  h+='<button class="cal-toggle" onclick="toggleCal()">📅</button>';
  h+='</div></div>';
  h+=renderMiniCal();

  HORIZONS.forEach(function(horizon){
    h+='<div class="horizon-block">';
    h+='<div class="h-header" style="background:var('+horizon.bgVar+')">';
    h+='<div class="h-dot" style="background:var('+horizon.cssVar+')"></div>';
    h+='<div class="h-name" style="color:var('+horizon.cssVar+')">'+horizon.label+'</div>';
    h+='<div class="h-vision">'+horizon.vision+'</div>';
    h+='</div>';

    horizon.qualities.forEach(function(qName){
      var allComps=COMPONENTS[qName]||[];
      var activeComps=allComps.filter(function(c){return !c.archived;});
      var archivedComps=allComps.filter(function(c){return c.archived;});
      var score=qualityScore(qName,dayChecked);
      var isOpen=!!openQualities[qName];
      var scoreHtml=score!==null?('<span class="quality-score" style="background:'+grad(score)+'22;color:'+grad(score)+'">'+score+'%</span>'):'';

      h+='<div class="quality-block">';
      h+='<div class="quality-title" onclick="toggleQuality('+JSON.stringify(qName)+')">';
      h+='<span class="quality-title-name">'+qName+'</span>'+scoreHtml;
      h+='<span class="arrow '+(isOpen?'open':'')+'">&#9654;</span>';
      h+='</div>';

      if(isOpen){
        h+='<div class="components-list">';

        // Active composantes
        activeComps.forEach(function(c){
          var val=dayChecked[c.id];
          var cls=stateClass(val);
          var icon=stateIcon(val);
          var descOpen=!!openDescs[c.id];
          h+='<div class="comp-row '+(cls||'')+'">';
          h+='<div class="comp-check" onclick="toggleComp('+JSON.stringify(c.id)+')">'+icon+'</div>';
          h+='<div class="comp-info" onclick="toggleDesc('+JSON.stringify(c.id)+')">';
          h+='<div class="comp-name">'+c.name+'</div>';
          if(c.desc) h+='<div class="comp-desc '+(descOpen?'open':'')+'">'+c.desc+'</div>';
          h+='</div>';
          h+='<div class="comp-actions">';
          h+='<button class="btn-icon" onclick="editComp('+JSON.stringify(qName)+','+JSON.stringify(c.id)+')">✏️</button>';
          h+='<button class="btn-icon" onclick="archiveComp('+JSON.stringify(qName)+','+JSON.stringify(c.id)+')">📦</button>';
          h+='<button class="btn-icon" onclick="deleteComp('+JSON.stringify(qName)+','+JSON.stringify(c.id)+')">🗑</button>';
          h+='</div></div>';
        });

        // Composantes archivées visibles sur jours passés avant archivage
        archivedComps.filter(function(c){
          return c.archivedAt && currentDay < c.archivedAt;
        }).forEach(function(c){
          var val=dayChecked[c.id];
          var cls=stateClass(val);
          var icon=stateIcon(val);
          h+='<div class="comp-row '+(cls||'')+'">';
          h+='<div class="comp-check" onclick="toggleComp('+JSON.stringify(c.id)+')">'+icon+'</div>';
          h+='<div class="comp-info">';
          h+='<div class="comp-name">'+c.name+'<span class="comp-archived-badge">archivée</span></div>';
          h+='</div></div>';
        });

        // Section archivées
        if(archivedComps.length){
          var aOpen=!!openArchived[qName];
          h+='<div class="archived-section">';
          h+='<button class="archived-toggle" onclick="toggleArchivedSection('+JSON.stringify(qName)+')">';
          h+=(aOpen?'▾':'▸')+' Archivées ('+archivedComps.length+')</button>';
          if(aOpen){
            archivedComps.forEach(function(c){
              h+='<div class="comp-row state-archived">';
              h+='<div class="comp-check" style="opacity:.4"></div>';
              h+='<div class="comp-info"><div class="comp-name">'+c.name;
              if(c.archivedAt) h+='<span class="comp-archived-badge">archivée le '+c.archivedAt+'</span>';
              h+='</div></div>';
              h+='<div class="comp-actions">';
              h+='<button class="btn-icon" onclick="unarchiveComp('+JSON.stringify(qName)+','+JSON.stringify(c.id)+')">♻️</button>';
              h+='<button class="btn-icon" onclick="deleteComp('+JSON.stringify(qName)+','+JSON.stringify(c.id)+')">🗑</button>';
              h+='</div></div>';
            });
          }
          h+='</div>';
        }

        h+='<button class="add-comp-btn" onclick="addComp('+JSON.stringify(qName)+')">+ Ajouter une composante</button>';
        h+='</div>'; // components-list
      }
      h+='</div>'; // quality-block
    });
    h+='</div>'; // horizon-block
  });

  h+='<div class="save-area">';
  h+='<button class="btn-save" onclick="saveDay()">Enregistrer la journée</button>';
  h+='<div class="day-total">'+okComps+' / '+totalComps+' composantes OK</div>';
  h+='</div>';
  document.getElementById('page-saisie').innerHTML=h;
}

// ── DASHBOARD ──
async function renderDashboard(){
  var el=document.getElementById('page-dashboard');
  el.innerHTML='<div class="loading">Chargement...</div>';
  var rows=await fetchDays(dashDays);
  var scores={};
  ALL_QUALITIES.forEach(function(q){scores[q]=[];});
  rows.forEach(function(row){
    ALL_QUALITIES.forEach(function(q){
      var p=qualityScore(q,row.checks||{});
      if(p!==null) scores[q].push(p);
    });
  });
  function avg(arr){return arr.length?Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length):null;}

  var h='<div class="dash-controls"><label>Période :</label>';
  h+='<input type="number" id="dash-days-in" value="'+dashDays+'" min="1" max="365" />';
  h+='<span style="font-size:12px;color:var(--muted)">jours</span>';
  h+='<button class="btn-refresh" onclick="setDashDays()">Actualiser</button>';
  h+='<span style="font-size:11px;color:var(--muted);margin-left:4px">'+rows.length+' jour'+(rows.length!==1?'s':'')+' de données</span></div>';

  HORIZONS.forEach(function(horizon){
    h+='<div class="dash-section"><div class="dash-section-title">'+horizon.label+'</div><div class="dash-grid">';
    horizon.qualities.forEach(function(q){
      var a=avg(scores[q]);
      var cardBg=a!==null?gradBg(a):'var(--surface)';
      var cardColor=a!==null?grad(a):'var(--muted)';
      var cardBorder=a!==null?grad(a):'var(--border)';
      var isOpen=!!openDashCards[q];
      var comps=(COMPONENTS[q]||[]).filter(function(c){return !c.archived;});
      var compAvgs=comps.map(function(c){
        var active=rows.filter(function(r){return (r.checks||{})[c.id]!=='skip';});
        var vals=active.map(function(r){return (r.checks||{})[c.id]===true?100:0;});
        return {name:c.name,avg:vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):null};
      });
      var detail='';
      if(isOpen&&comps.length){
        detail='<div class="dash-card-detail open">';
        compAvgs.forEach(function(ca){
          var cc=ca.avg!==null?grad(ca.avg):'var(--muted)';
          detail+='<div class="comp-detail-row"><span>'+ca.name+'</span><span style="color:'+cc+';font-weight:600">'+(ca.avg!==null?ca.avg+'%':'—')+'</span></div>';
        });
        detail+='</div>';
      }
      h+='<div class="dash-card" style="background:'+cardBg+';color:'+cardColor+';border-color:'+cardBorder+'" onclick="toggleDashCard('+JSON.stringify(q)+')">';
      h+='<div class="dash-card-name" style="color:'+cardColor+'">'+q+'</div>';
      h+='<div class="dash-card-pct" style="color:'+cardColor+'">'+(a!==null?a+'%':'—')+'</div>';
      h+='<div class="dash-card-sub">'+scores[q].length+' jours · détail</div>';
      h+=detail+'</div>';
    });
    h+='</div></div>';
  });
  el.innerHTML=h;
}
function toggleDashCard(q){ openDashCards[q]=!openDashCards[q]; renderDashboard(); }
function setDashDays(){ dashDays=parseInt(document.getElementById('dash-days-in').value)||30; openDashCards={}; renderDashboard(); }

// ── HEBDO ──
async function renderHebdo(){
  var el=document.getElementById('page-hebdo');
  el.innerHTML='<div class="loading">Chargement...</div>';
  var rows=await fetchDays(weekDays);
  var byDate={};
  rows.forEach(function(r){byDate[r.date]=r.checks||{};});
  var dates=[];
  for(var i=weekDays-1;i>=0;i--){ var d=new Date(); d.setDate(d.getDate()-i); dates.push(dStr(d)); }
  var dayLabels=dates.map(function(dt){
    var d=new Date(dt+'T00:00:00');
    return d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,2);
  });

  var h='<div class="dash-controls"><label>Période :</label>';
  h+='<input type="number" id="week-days-in" value="'+weekDays+'" min="1" max="90" />';
  h+='<span style="font-size:12px;color:var(--muted)">jours</span>';
  h+='<button class="btn-refresh" onclick="setWeekDays()">Actualiser</button></div>';

  HORIZONS.forEach(function(horizon){
    h+='<div class="dash-section"><div class="dash-section-title">'+horizon.label+'</div>';
    horizon.qualities.forEach(function(q){
      var barData=dates.map(function(dt){return qualityScore(q,byDate[dt]||{});});
      h+='<div class="week-card"><div class="week-card-title">'+q+'</div><div class="week-bars">';
      barData.forEach(function(p,i){
        var h100=p!==null?p:0;
        var col=p===null?'var(--border)':grad(p);
        h+='<div class="week-bar-wrap">';
        h+='<div class="week-bar-pct" style="color:'+col+'">'+(p!==null?p:'—')+'</div>';
        h+='<div class="week-bar-col"><div class="week-bar" style="height:'+h100+'%;background:'+col+';width:100%"></div></div>';
        h+='<div class="week-bar-label">'+dayLabels[i]+'</div>';
        h+='</div>';
      });
      h+='</div></div>';
    });
    h+='</div>';
  });
  el.innerHTML=h;
}
function setWeekDays(){ weekDays=parseInt(document.getElementById('week-days-in').value)||7; renderHebdo(); }

// ── FETCH ──
async function fetchDays(n){
  var cutoff=new Date(); cutoff.setDate(cutoff.getDate()-n);
  var res=await sb.from('suivi_jours').select('*').gte('date',dStr(cutoff));
  return res.data||[];
}

// ── PAGE NAV ──
function showPage(page,btn){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  if(page==='dashboard') renderDashboard();
  if(page==='hebdo') renderHebdo();
}
</script>
