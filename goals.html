<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Objectifs Stratégiques</title>
<style>
:root {
  --spirituel:#7c3aed; --professionnel:#059669; --social:#dc2626; --personnel:#2563eb;
  --bg:#f8f7f4; --surface:#ffffff; --text:#1a1a18; --muted:#6b6b67;
  --border:rgba(0,0,0,0.09); --radius:12px;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1c1c1a;--text:#f0efe8;--muted:#8a8a84;--border:rgba(255,255,255,0.09);
  --shadow:0 1px 4px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{position:sticky;top:0;z-index:200;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;height:54px}
.nav-brand{font-size:14px;font-weight:700}
.nav-back{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--muted);display:none;align-items:center;gap:5px}
.nav-back.visible{display:flex}
.btn-add-goal{background:var(--text);color:var(--bg);border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:600}
.screen{display:none;padding:1.25rem;max-width:900px;margin:0 auto}
.screen.active{display:block}

/* HOME TABS */
.home-tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:1px solid var(--border)}
.home-tab-btn{padding:8px 18px;border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.home-tab-btn.active{color:var(--text);border-bottom-color:var(--text)}

/* OBJECTIFS */
.horizon-section{margin-bottom:2rem}
.horizon-label{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.horizon-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.horizon-name{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.horizon-vision{font-size:11px;font-style:italic;opacity:.6}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}

/* GOAL CARD — compact */
.goal-card{background:var(--surface);border:2px solid transparent;border-radius:14px;padding:.875rem 1rem;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:var(--shadow)}
.goal-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.1)}
.goal-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:.25rem}
.goal-card-name{font-size:14px;font-weight:700;line-height:1.3;flex:1}
.goal-card-quality{font-size:11px;color:var(--muted);margin-bottom:.6rem}
.goal-card-actions{display:flex;gap:4px;flex-shrink:0}
.btn-card-action{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:3px 5px;border-radius:6px}
.btn-card-action:hover{background:var(--border)}
.goal-card-body{display:flex;gap:10px;align-items:flex-start}
.goal-card-left{flex:1;min-width:0}
.goal-card-right{flex:1;min-width:0}
.goal-dates{font-size:10px;color:var(--muted);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.health-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.health-green{background:#d1fae5;color:#065f46}
.health-red{background:#fee2e2;color:#7f1d1d}
@media(prefers-color-scheme:dark){.health-green{background:#064e35;color:#6ee7b7}.health-red{background:#450a0a;color:#fca5a5}}
.prog-block{margin-bottom:4px}
.prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:2px}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}

/* À FAIRE TAB */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filter-bar label{font-size:12px;color:var(--muted)}
.filter-bar input[type=date]{padding:5px 8px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;font-family:inherit}
.btn-filter{padding:6px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:12px;cursor:pointer}
.task-group{margin-bottom:1.25rem}
.task-group-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.task-group-label.late{color:#dc2626}
.task-group-label.today-lbl{color:#059669}
.home-task-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.65rem .9rem;display:flex;align-items:center;gap:10px;margin-bottom:5px;box-shadow:var(--shadow)}
.home-task-row.overdue{border-color:#fca5a5}
.home-task-row.done-row{opacity:.5}
@media(prefers-color-scheme:dark){.home-task-row.overdue{border-color:#7f1d1d}}
.home-task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.home-task-check.done-check{background:#059669;border-color:#059669;color:#fff}
.home-task-info{flex:1;min-width:0}
.home-task-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.home-task-name.done-name{text-decoration:line-through}
.home-task-goal{font-size:10px;margin-top:1px}
.no-tasks{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:13px}

/* DETAIL */
.detail-header{margin-bottom:1.25rem}
.detail-horizon-tag{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:.5rem;opacity:.7}
.detail-title{font-size:22px;font-weight:800;line-height:1.2;margin-bottom:.3rem}
.detail-quality{font-size:13px;color:var(--muted)}
.tabs{display:flex;gap:4px;margin-bottom:1.25rem;border-bottom:1px solid var(--border)}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text)}
.tab-content{display:none}
.tab-content.active{display:block}

/* VISION TAB */
.vision-box{background:var(--surface);border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.vision-phrase{font-size:17px;font-style:italic;line-height:1.6;margin-bottom:1.25rem;opacity:.8}
.definition-box{background:var(--bg);border-radius:10px;padding:1rem;margin-bottom:1.25rem;font-size:14px;line-height:1.6}
.definition-label{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
@media(min-width:480px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi-card{background:var(--bg);border-radius:10px;padding:.75rem;text-align:center}
.kpi-val{font-size:20px;font-weight:700;line-height:1}
.kpi-label{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

/* STEPS & TASKS TAB */
.step-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:1rem;box-shadow:var(--shadow);overflow:hidden}
.step-header{padding:.875rem 1rem;cursor:pointer;display:flex;align-items:center;gap:10px}
.step-header:hover{background:var(--bg)}
.step-toggle-icon{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.step-toggle-icon.open{transform:rotate(90deg)}
.step-info{flex:1;min-width:0}
.step-name{font-size:14px;font-weight:600;margin-bottom:3px}
.step-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.step-dates{font-size:10px;color:var(--muted)}
.step-weight-badge{font-size:10px;background:var(--bg);border-radius:4px;padding:1px 6px;color:var(--muted)}
.step-scores{display:flex;gap:8px;flex-shrink:0;align-items:center}
.step-score-item{text-align:center}
.step-score-val{font-size:13px;font-weight:700}
.step-score-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.step-actions{display:flex;gap:4px;flex-shrink:0}
.step-body{border-top:1px solid var(--border);padding:.75rem 1rem}
.step-prog{margin-bottom:.75rem}
.step-prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px}
.step-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.step-bar-fill{height:100%;border-radius:2px}

/* TASK LIST in step */
.tasks-in-step{display:flex;flex-direction:column;gap:5px}
.task-row{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:.6rem .9rem;display:flex;align-items:center;gap:10px}
.task-row.done{opacity:.55}
.task-row.overdue{border-color:#fca5a5}
@media(prefers-color-scheme:dark){.task-row.overdue{border-color:#7f1d1d}}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.task-row.done .task-check{background:#059669;border-color:#059669;color:#fff}
.task-main{flex:1;cursor:pointer;min-width:0}
.task-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-row.done .task-name{text-decoration:line-through}
.task-meta-row{display:flex;align-items:center;gap:8px;margin-top:2px}
.task-date{font-size:10px;color:var(--muted)}
.task-date.late{color:#dc2626}
.task-wt{font-size:10px;background:var(--surface);border-radius:4px;padding:1px 5px;color:var(--muted)}
.task-delete{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 4px;border-radius:5px;flex-shrink:0}
.task-delete:hover{color:#dc2626}

.btn-add-bottom{margin-top:.6rem;background:transparent;border:2px dashed var(--border);border-radius:9px;width:100%;padding:8px;cursor:pointer;font-size:12px;color:var(--muted);transition:border-color .15s}
.btn-add-bottom:hover{border-color:var(--muted)}
.btn-add-step{margin-top:1rem;background:transparent;border:2px dashed var(--border);border-radius:12px;width:100%;padding:10px;cursor:pointer;font-size:13px;color:var(--muted);transition:border-color .15s}
.btn-add-step:hover{border-color:var(--muted)}

.inline-form{background:var(--bg);border-radius:10px;padding:.75rem;margin-top:.6rem}
.form-row{display:flex;gap:8px;flex-wrap:wrap}
.form-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:110px}
.form-field label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.form-field input,.form-field select,.form-field textarea{padding:.5rem .65rem;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;width:100%}
.form-field textarea{min-height:55px;resize:vertical}
.form-btns{display:flex;gap:6px;margin-top:.5rem}
.btn-save-sm{background:var(--text);color:var(--bg);border:none;border-radius:7px;padding:7px 16px;cursor:pointer;font-size:13px;font-weight:600}
.btn-cancel-sm{background:transparent;border:1px solid var(--border);border-radius:7px;padding:7px 12px;cursor:pointer;font-size:13px;color:var(--muted)}
.feedback-sm{font-size:11px;margin-top:4px;min-height:16px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:16px 16px 0 0;padding:1.25rem 1rem 2rem;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1rem}
.modal-field{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem}
.modal-field label{font-size:11px;color:var(--muted);font-weight:500}
.modal-field input,.modal-field select,.modal-field textarea{padding:.6rem .8rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;width:100%}
.modal-field textarea{min-height:80px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:1rem}
.btn-primary{flex:1;padding:11px;background:var(--text);color:var(--bg);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel{flex:1;padding:11px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer}
.btn-danger{flex:1;padding:11px;background:#dc2626;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.confirm-msg{font-size:14px;color:var(--muted);margin-bottom:1rem;line-height:1.5}
.feedback{text-align:center;font-size:12px;min-height:18px;margin-top:6px}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:13px}

/* CALENDRIER */
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.cal-nav-group{display:flex;align-items:center;gap:6px}
.cal-period-label{font-size:14px;font-weight:600;min-width:120px;text-align:center}
.cal-nav-arrow{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:13px;color:var(--text)}
.cal-view-toggle{display:flex;gap:3px;background:var(--bg);border-radius:8px;padding:3px}
.cal-view-btn{padding:5px 12px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer}
.cal-view-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* MONTH VIEW */
.cal-month-grid{display:grid;grid-template-columns:repeat(7,100px);gap:1px;background:var(--border);border-radius:10px;overflow:hidden;min-width:706px}
.cal-month-dow{background:var(--bg);padding:4px 2px;text-align:center;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.cal-month-day{background:var(--surface);padding:3px;vertical-align:top}
.cal-month-day.other-month{background:var(--bg);opacity:.45}
.cal-month-day.is-today .cal-day-num{background:var(--text);color:var(--bg);border-radius:50%}
.cal-day-num{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:2px;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.cal-task-pill{border-radius:3px;padding:1px 4px;margin-bottom:1px;cursor:pointer;transition:opacity .15s;display:block;width:100%}
.cal-task-pill:hover{opacity:.75}
.cal-task-pill-name{font-size:9px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
.cal-task-pill.done-task{opacity:.35}
.cal-more{font-size:8px;color:var(--muted);padding:0 2px}

/* WEEK VIEW */
.cal-week-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch}
.cal-week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;min-width:480px;align-items:stretch}
.cal-week-col{display:flex;flex-direction:column;background:var(--surface);border-radius:10px;padding:8px 6px;border:1px solid var(--border)}
.cal-week-dow{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;text-align:center}
.cal-week-date{font-size:13px;font-weight:600;text-align:center;margin-bottom:8px;padding:3px;border-radius:6px}
.cal-week-date.is-today{background:var(--text);color:var(--bg)}
.cal-week-tasks{flex:1}
.cal-week-task{border-radius:6px;padding:5px 7px;margin-bottom:4px;cursor:pointer;transition:opacity .15s}
.cal-week-task:hover{opacity:.8}
.cal-week-task-name{font-size:11px;font-weight:500;line-height:1.3;margin-bottom:1px;word-break:break-word}
.cal-week-task-goal{font-size:9px;opacity:.7;word-break:break-word}
.cal-week-task.done-task{opacity:.35}
.btn-icon-sm{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px 4px;border-radius:5px}
.btn-icon-sm:hover{background:var(--border)}
</style>
</head>
<body>

<nav>
  <button class="nav-back" id="nav-back" onclick="goHome()">&#8592; Retour</button>
  <div class="nav-brand">Objectifs Stratégiques</div>
  <button class="btn-add-goal" id="btn-add-goal" onclick="openGoalModal(null,null)">+ Objectif</button>
</nav>

<div id="screen-home" class="screen active">
  <div class="home-tabs">
    <button class="home-tab-btn active" onclick="switchHomeTab('objectifs',this)">Objectifs</button>
    <button class="home-tab-btn" onclick="switchHomeTab('todo',this)">À faire</button>
    <button class="home-tab-btn" onclick="switchHomeTab('calendrier',this)">Calendrier</button>
  </div>
  <div id="home-content"><div class="loading">Chargement...</div></div>
  <div id="todo-content" style="display:none"></div>
  <div id="cal-content" style="display:none"></div>
</div>

<div id="screen-detail" class="screen">
  <div class="detail-header">
    <div class="detail-horizon-tag" id="detail-horizon-tag"></div>
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-quality" id="detail-quality"></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('vision',this)">Vision</button>
    <button class="tab-btn" onclick="switchTab('steps',this)">Tâches</button>
  </div>
  <div id="tab-vision" class="tab-content active"></div>
  <div id="tab-steps" class="tab-content"></div>
</div>

<!-- MODAL GOAL -->
<div class="modal-overlay hidden" id="modal-goal">
  <div class="modal">
    <div class="modal-title" id="modal-goal-title">Nouvel objectif</div>
    <div class="modal-field"><label>Nom de l'objectif</label><input type="text" id="goal-name" placeholder="Ex: Lancer mon activité freelance" /></div>
    <div class="modal-field"><label>Qualité associée</label><select id="goal-quality"></select></div>
    <div class="modal-field"><label>Définition (optionnel)</label><textarea id="goal-definition" placeholder="Contexte, pourquoi cet objectif..."></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-goal')">Annuler</button>
      <button class="btn-primary" onclick="saveGoal()">Enregistrer</button>
    </div>
    <div class="feedback" id="goal-fb"></div>
  </div>
</div>

<!-- MODAL CONFIRM -->
<div class="modal-overlay hidden" id="modal-confirm">
  <div class="modal">
    <div class="modal-title">Confirmer la suppression</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-confirm')">Annuler</button>
      <button class="btn-danger" id="confirm-ok">Supprimer</button>
    </div>
  </div>
</div>

<!-- MODAL TASK EDIT -->
<div class="modal-overlay hidden" id="modal-task">
  <div class="modal">
    <div class="modal-title" id="modal-task-title">Tâche</div>
    <div class="modal-field"><label>Nom</label><input type="text" id="task-edit-name" /></div>
    <div class="modal-field"><label>Descriptif</label><textarea id="task-edit-desc"></textarea></div>
    <div class="modal-field"><label>Date d'échéance</label><input type="date" id="task-edit-date" /></div>
    <div class="modal-field"><label>Poids (1–5)</label>
      <select id="task-edit-weight"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-task')">Annuler</button>
      <button class="btn-primary" onclick="saveTaskEdit()">Enregistrer</button>
    </div>
    <div class="feedback" id="task-fb"></div>
  </div>
</div>

<!-- MODAL STEP EDIT -->
<div class="modal-overlay hidden" id="modal-step">
  <div class="modal">
    <div class="modal-title" id="modal-step-title">Étape</div>
    <div class="modal-field"><label>Nom de l'étape</label><input type="text" id="step-edit-name" /></div>
    <div class="modal-field"><label>Poids (1–5)</label>
      <select id="step-edit-weight"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-step')">Annuler</button>
      <button class="btn-primary" onclick="saveStepEdit()">Enregistrer</button>
    </div>
    <div class="feedback" id="step-fb"></div>
  </div>
</div>

<script>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function lerp(a,b,t){return[Math.round(a[0]+(b[0]-a[0])*t),Math.round(a[1]+(b[1]-a[1])*t),Math.round(a[2]+(b[2]-a[2])*t)];}
function grad(p){var t=p/100,r=[220,38,38],o=[234,88,12],g=[5,150,105],rgb;if(t<=0.5)rgb=lerp(r,o,t*2);else rgb=lerp(o,g,(t-0.5)*2);return 'rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')';}
function gradBg(p){var t=p/100,r=[220,38,38],o=[234,88,12],g=[5,150,105],rgb;if(t<=0.5)rgb=lerp(r,o,t*2);else rgb=lerp(o,g,(t-0.5)*2);var dk=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;return 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+(dk?0.25:0.13)+')';}

// ── CALCULS ──
function calcStep(step){
  var today=todayStr();
  var st=tasks.filter(function(t){return t.step_id===step.id;});
  if(!st.length) return {progGlobal:0,progDate:100,dateStart:null,dateEnd:null};
  var dates=st.map(function(t){return t.due_date;}).filter(Boolean).sort();
  var dateStart=dates[0]||null, dateEnd=dates[dates.length-1]||null;
  var totalW=st.reduce(function(s,t){return s+t.weight;},0);
  var doneW=st.filter(function(t){return t.done;}).reduce(function(s,t){return s+t.weight;},0);
  var progGlobal=totalW>0?Math.round(doneW/totalW*100):0;
  var due=st.filter(function(t){return t.due_date&&t.due_date<=today;});
  var dueW=due.reduce(function(s,t){return s+t.weight;},0);
  var dueDoneW=due.filter(function(t){return t.done;}).reduce(function(s,t){return s+t.weight;},0);
  var progDate=dueW>0?Math.round(dueDoneW/dueW*100):100;
  return {progGlobal:progGlobal,progDate:progDate,dateStart:dateStart,dateEnd:dateEnd};
}

function calcGoal(goal){
  var gs=steps.filter(function(s){return s.goal_id===goal.id;});
  if(!gs.length) return {progGlobal:0,progDate:100,dateStart:null,dateEnd:null,healthy:true};
  var totalW=gs.reduce(function(s,st){return s+st.weight;},0);
  var sumGlobal=0, sumDate=0;
  var allDateStarts=[], allDateEnds=[];
  gs.forEach(function(st){
    var c=calcStep(st);
    sumGlobal+=c.progGlobal*st.weight;
    sumDate+=c.progDate*st.weight;
    if(c.dateStart) allDateStarts.push(c.dateStart);
    if(c.dateEnd) allDateEnds.push(c.dateEnd);
  });
  var progGlobal=totalW>0?Math.round(sumGlobal/totalW):0;
  var progDate=totalW>0?Math.round(sumDate/totalW):100;
  allDateStarts.sort(); allDateEnds.sort();
  return {
    progGlobal:progGlobal, progDate:progDate,
    dateStart:allDateStarts[0]||null, dateEnd:allDateEnds[allDateEnds.length-1]||null,
    healthy:progDate===100
  };
}

  var m=new Date(d); m.setDate(diff); m.setHours(0,0,0,0); return m;
}
function calDStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

  var goal=goals.find(function(g){return g.id===goalId;}); if(!goal) return '#888';

}
function horizonBgForGoal(goalId){

    dows.forEach(function(d){h+='<div class="cal-month-dow">'+d+'</div>';});
    for(var i=0;i<startDow;i++){
      var pd=new Date(calYear,calMonth,1-startDow+i);

      var pdTasks=byDate[pdStr]||[];
      h+='<div class="cal-month-day other-month"><div class="cal-day-num">'+pd.getDate()+'</div>';

      var isToday=dtStr===today;

      dayTasks.slice(0,3).forEach(function(t){

      h+='</div>';
    }
    var total=startDow+lastDay.getDate();
    var rem=(7-total%7)%7;
    for(var i=1;i<=rem;i++){
      var nd=new Date(calYear,calMonth+1,i);
      var ndStr=calDStr(nd);
      var ndTasks=byDate[ndStr]||[];
      h+='<div class="cal-month-day other-month"><div class="cal-day-num">'+i+'</div>';

// ── À FAIRE ──
function renderTodo(filterFrom,filterTo){
  var today=todayStr();
  var defaultTo=addDays(today,8);
  todoFilterFrom=filterFrom; todoFilterTo=filterTo;
  var to=filterTo||defaultTo;
  var filtered;
  if(filterFrom){
    filtered=tasks.filter(function(t){return t.due_date&&t.due_date>=filterFrom&&t.due_date<=to;});
  } else {
    filtered=tasks.filter(function(t){
      if(!t.due_date)return false;
      return (!t.done&&t.due_date<today)||(t.due_date>=today&&t.due_date<=to);
    });
  }
  filtered.sort(function(a,b){return a.due_date.localeCompare(b.due_date);});
  var groups={},groupOrder=[];
  filtered.forEach(function(t){if(!groups[t.due_date]){groups[t.due_date]=[];groupOrder.push(t.due_date);}groups[t.due_date].push(t);});

  var h='<div class="filter-bar">';
  h+='<label>Du</label><input type="date" id="todo-from" value="'+(filterFrom||'')+'" />';
  h+='<label>Au</label><input type="date" id="todo-to" value="'+(filterTo||defaultTo)+'" />';
  h+='<button class="btn-filter" onclick="applyTodoFilter()">Filtrer</button>';
  if(filterFrom) h+='<button class="btn-filter" onclick="renderTodo(null,null)">Réinitialiser</button>';
  h+='</div>';

  if(!groupOrder.length){
    h+='<div class="no-tasks">Aucune tâche en retard ou à venir sur cette période.</div>';
  } else {
    groupOrder.forEach(function(dk){
      var isLate=dk<today,isToday=dk===today,isTomorrow=dk===addDays(today,1);
      var lbl=isLate?('En retard — '+fmtDateFull(dk)):isToday?'Aujourd\'hui':isTomorrow?'Demain':fmtDateFull(dk);
      var lCls=isLate?'late':isToday?'today-lbl':'';
      h+='<div class="task-group"><div class="task-group-label '+lCls+'">'+lbl+'</div>';
      groups[dk].forEach(function(t){
        var step=steps.find(function(s){return s.id===t.step_id;});
        var goal=step?goals.find(function(g){return g.id===step.goal_id;}):null;
        var horizon=goal?horizonOf(goal.quality):null;
        var hColor=horizon?horizon.color:'var(--muted)';
        h+='<div class="home-task-row'+(isLate&&!t.done?' overdue':'')+(t.done?' done-row':'')+'">';
        h+='<div class="home-task-check'+(t.done?' done-check':'')+'" onclick="toggleTaskTodo(\''+t.id+'\')">'+  (t.done?'✓':'')+'</div>';
        h+='<div class="home-task-info"><div class="home-task-name'+(t.done?' done-name':'')+'">'+esc(t.name)+'</div>';
        h+='<div class="home-task-goal" style="color:'+hColor+'">'+(goal?esc(goal.name):'')+(step?' · '+esc(step.name):'')+'</div></div>';
        h+='<div style="font-size:10px;background:var(--bg);border-radius:4px;padding:1px 6px;color:var(--muted);flex-shrink:0">×'+t.weight+'</div>';
        h+='</div>';
      });
      h+='</div>';
    });
  }
  document.getElementById('todo-content').innerHTML=h;
}

function applyTodoFilter(){
  var from=document.getElementById('todo-from').value||null;
  var to=document.getElementById('todo-to').value||null;
  renderTodo(from,to);
}

async function toggleTaskTodo(taskId){
  var t=tasks.find(function(t){return t.id===taskId;});
  if(!t)return;
  t.done=!t.done;
  await sb.from('tasks').update({done:t.done}).eq('id',taskId);
  renderTodo(todoFilterFrom,todoFilterTo);
}

async function renderDetailTabs(){
  var c=calcGoal(currentGoal);
  var h=horizonOf(currentGoal.quality);

  // VISION
  var v='<div class="vision-box">';
  v+='<div class="vision-phrase">"'+esc(h.vision)+'"</div>';
  if(currentGoal.definition) v+='<div class="definition-box"><div class="definition-label">Définition</div>'+esc(currentGoal.definition)+'</div>';
  v+='<div class="kpi-grid">';
  v+='<div class="kpi-card"><div class="kpi-val" style="font-size:13px">'+fmtDateFull(c.dateStart)+'</div><div class="kpi-label">Début</div></div>';
  v+='<div class="kpi-card"><div class="kpi-val" style="font-size:13px">'+fmtDateFull(c.dateEnd)+'</div><div class="kpi-label">Fin</div></div>';
  v+='<div class="kpi-card"><div class="kpi-val" style="color:'+grad(c.progGlobal)+'">'+c.progGlobal+'%</div><div class="kpi-label">Global</div></div>';
  v+='<div class="kpi-card"><div class="kpi-val" style="color:'+grad(c.progDate)+'">'+c.progDate+'%</div><div class="kpi-label">À date</div></div>';
  v+='</div><div style="margin-top:.75rem"><div class="health-badge '+(c.healthy?'health-green':'health-red')+'">'+(c.healthy?'🟢 Toutes les tâches échues complétées':'🔴 Des tâches échues non complétées')+'</div></div>';
  v+='</div>';
  document.getElementById('tab-vision').innerHTML=v;

  // STEPS & TASKS
  renderStepsTab();
}

function renderStepsTab(){
  var today=todayStr();
  var goalSteps=steps.filter(function(s){return s.goal_id===currentGoal.id;});
  var h='';

  goalSteps.forEach(function(step){
    var sc=calcStep(step);
    var st=tasks.filter(function(t){return t.step_id===step.id;});
    var isOpen=openSteps.has(step.id);

    h+='<div class="step-block">';
    // Step header
    h+='<div class="step-header" onclick="toggleStep(\''+step.id+'\')">';
    h+='<div class="step-toggle-icon '+(isOpen?'open':'')+'">▶</div>';
    h+='<div class="step-info">';
    h+='<div class="step-name">'+esc(step.name)+'</div>';
    h+='<div class="step-meta">';
    h+='<span class="step-dates">'+fmtDate(sc.dateStart)+' → '+fmtDate(sc.dateEnd)+'</span>';
    h+='<span class="step-weight-badge">Poids '+step.weight+'</span>';
    h+='</div></div>';
    h+='<div class="step-scores">';
    h+='<div class="step-score-item"><div class="step-score-val" style="color:'+grad(sc.progGlobal)+'">'+sc.progGlobal+'%</div><div class="step-score-lbl">Global</div></div>';
    h+='<div class="step-score-item"><div class="step-score-val" style="color:'+grad(sc.progDate)+'">'+sc.progDate+'%</div><div class="step-score-lbl">À date</div></div>';
    h+='</div>';
    h+='<div class="step-actions" onclick="event.stopPropagation()">';
    h+='<button class="btn-icon-sm" onclick="openStepEdit(\''+step.id+'\')">✏️</button>';
    h+='<button class="btn-icon-sm" onclick="confirmDelete(\'step\',\''+step.id+'\',\''+step.name.replace(/'/g,"&#39;")+'\')">🗑</button>';
    h+='</div></div>';

    if(isOpen){
      h+='<div class="step-body">';
      // Prog bars
      h+='<div class="step-prog">';
      h+='<div class="step-prog-row"><span>Global</span><span>'+sc.progGlobal+'%</span></div>';
      h+='<div class="step-bar"><div class="step-bar-fill" style="width:'+sc.progGlobal+'%;background:'+grad(sc.progGlobal)+'"></div></div>';
      h+='<div class="step-prog-row"><span>À date</span><span>'+sc.progDate+'%</span></div>';
      h+='<div class="step-bar"><div class="step-bar-fill" style="width:'+sc.progDate+'%;background:'+grad(sc.progDate)+'"></div></div>';
      h+='</div>';
      // Tasks
      h+='<div class="tasks-in-step">';
      if(!st.length){
        h+='<div style="font-size:12px;color:var(--muted);text-align:center;padding:.5rem">Aucune tâche dans cette étape</div>';
      } else {
        st.forEach(function(t){
          var overdue=!t.done&&t.due_date&&t.due_date<today;
          h+='<div class="task-row'+(t.done?' done':'')+(overdue?' overdue':'')+'">';
          h+='<div class="task-check" onclick="toggleTask(\''+t.id+'\')">'+  (t.done?'✓':'')+'</div>';
          h+='<div class="task-main" onclick="openTaskEdit(\''+t.id+'\')">';
          h+='<div class="task-name">'+esc(t.name)+'</div>';
          h+='<div class="task-meta-row"><span class="task-date'+(overdue?' late':'')+'">'+fmtDateFull(t.due_date)+'</span>';
          h+='<span class="task-wt">×'+t.weight+'</span>';
          if(t.description) h+='<span style="font-size:10px;color:var(--muted)">📝</span>';
          h+='</div></div>';
          h+='<button class="task-delete" onclick="confirmDelete(\'task\',\''+t.id+'\',\''+t.name.replace(/'/g,"&#39;")+'\')">🗑</button>';
          h+='</div>';
        });
      }
      h+='</div>';
      // Add task button
      h+='<button class="btn-add-bottom" onclick="showAddTaskForm(\''+step.id+'\')">+ Ajouter une tâche</button>';
      h+='<div id="add-task-form-'+step.id+'" style="display:none">';
      h+='<div class="inline-form"><div class="form-row">';
      h+='<div class="form-field" style="flex:2;min-width:140px"><label>Nom</label><input type="text" id="nt-name-'+step.id+'" placeholder="Nom de la tâche" /></div>';
      h+='<div class="form-field"><label>Échéance</label><input type="date" id="nt-date-'+step.id+'" /></div>';
      h+='<div class="form-field" style="max-width:75px"><label>Poids</label><select id="nt-weight-'+step.id+'"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>';
      h+='</div>';
      h+='<div class="form-field" style="margin-top:.4rem"><label>Descriptif</label><textarea id="nt-desc-'+step.id+'" placeholder="Optionnel..."></textarea></div>';
      h+='<div class="form-btns">';
      h+='<button class="btn-save-sm" onclick="addTask(\''+step.id+'\')">Enregistrer</button>';
      h+='<button class="btn-cancel-sm" onclick="hideAddTaskForm(\''+step.id+'\')">Annuler</button>';
      h+='</div><div class="feedback-sm" id="nt-fb-'+step.id+'"></div></div>';
      h+='</div>';
      h+='</div>';
    }
    h+='</div>';
  });

  // Add step button
  h+='<button class="btn-add-step" onclick="showAddStepForm()">+ Ajouter une étape</button>';
  h+='<div id="add-step-form" style="display:none">';
  h+='<div class="inline-form"><div class="form-row">';
  h+='<div class="form-field" style="flex:2"><label>Nom de l\'étape</label><input type="text" id="ns-name" placeholder="Ex: Phase de recherche" /></div>';
  h+='<div class="form-field" style="max-width:75px"><label>Poids</label><select id="ns-weight"><option>1</option><option>2</option><option selected>3</option><option>4</option><option>5</option></select></div>';
  h+='</div>';
  h+='<div class="form-btns">';
  h+='<button class="btn-save-sm" onclick="addStep()">Enregistrer</button>';
  h+='<button class="btn-cancel-sm" onclick="hideAddStepForm()">Annuler</button>';
  h+='</div><div class="feedback-sm" id="ns-fb"></div></div>';
  h+='</div>';

  document.getElementById('tab-steps').innerHTML=h;
}

function toggleStep(stepId){ openSteps.has(stepId)?openSteps.delete(stepId):openSteps.add(stepId); renderStepsTab(); }
function showAddTaskForm(sid){ var p=document.getElementById('add-task-form-'+sid); if(p){p.style.display='block';setTimeout(function(){var n=document.getElementById('nt-name-'+sid);if(n)n.focus();},100);} }
function hideAddTaskForm(sid){ var p=document.getElementById('add-task-form-'+sid); if(p) p.style.display='none'; }
function showAddStepForm(){ var p=document.getElementById('add-step-form'); if(p){p.style.display='block';setTimeout(function(){var n=document.getElementById('ns-name');if(n)n.focus();},100);} }
function hideAddStepForm(){ var p=document.getElementById('add-step-form'); if(p) p.style.display='none'; }

// ── ADD STEP ──
async function addStep(){
  var name=(document.getElementById('ns-name').value||'').trim();
  var weight=parseInt(document.getElementById('ns-weight').value)||3;
  var fb=document.getElementById('ns-fb');
  if(!name){fb.textContent='Nom requis';fb.style.color='#dc2626';return;}
  var goalSteps=steps.filter(function(s){return s.goal_id===currentGoal.id;});
  var res=await sb.from('steps').insert({goal_id:currentGoal.id,name:name,weight:weight,position:goalSteps.length}).select().single();
  if(res.error){fb.textContent='Erreur: '+res.error.message;fb.style.color='#dc2626';return;}
  steps.push(res.data);
  openSteps.add(res.data.id);
  renderStepsTab();
}

// ── STEP EDIT ──
function openStepEdit(stepId){
  var s=steps.find(function(s){return s.id===stepId;});
  if(!s)return;
  editStepId=stepId;
  document.getElementById('modal-step-title').textContent=s.name;
  document.getElementById('step-edit-name').value=s.name;
  document.getElementById('step-edit-weight').value=s.weight||3;
  document.getElementById('step-fb').textContent='';
  document.getElementById('modal-step').classList.remove('hidden');
}
async function saveStepEdit(){
  var name=(document.getElementById('step-edit-name').value||'').trim();
  var weight=parseInt(document.getElementById('step-edit-weight').value)||3;
  var fb=document.getElementById('step-fb');
  if(!name){fb.textContent='Nom requis';fb.style.color='#dc2626';return;}
  var res=await sb.from('steps').update({name:name,weight:weight}).eq('id',editStepId);
  if(res.error){fb.textContent='Erreur: '+res.error.message;fb.style.color='#dc2626';return;}
  var s=steps.find(function(s){return s.id===editStepId;});
  if(s){s.name=name;s.weight=weight;}
  closeModal('modal-step'); renderStepsTab();
}

// ── ADD TASK ──
async function addTask(stepId){
  var name=(document.getElementById('nt-name-'+stepId).value||'').trim();
  var date=document.getElementById('nt-date-'+stepId).value;
  var weight=parseInt(document.getElementById('nt-weight-'+stepId).value)||3;
  var desc=(document.getElementById('nt-desc-'+stepId).value||'').trim();
  var fb=document.getElementById('nt-fb-'+stepId);
  if(!name){fb.textContent='Nom requis';fb.style.color='#dc2626';return;}
  var res=await sb.from('tasks').insert({step_id:stepId,goal_id:currentGoal.id,name:name,description:desc,due_date:date||null,weight:weight,done:false}).select().single();
  if(res.error){fb.textContent='Erreur: '+res.error.message;fb.style.color='#dc2626';return;}
  tasks.push(res.data);
  renderStepsTab();
}

// ── TOGGLE TASK ──
async function toggleTask(taskId){
  var t=tasks.find(function(t){return t.id===taskId;});
  if(!t)return;
  t.done=!t.done;
  await sb.from('tasks').update({done:t.done}).eq('id',taskId);
  await renderDetailTabs();
}

// ── TASK EDIT ──
function openTaskEdit(taskId){
  var t=tasks.find(function(t){return t.id===taskId;});
  if(!t)return;
  editTaskId=taskId;
  document.getElementById('modal-task-title').textContent=t.name;
  document.getElementById('task-edit-name').value=t.name;
  document.getElementById('task-edit-desc').value=t.description||'';
  document.getElementById('task-edit-date').value=t.due_date||'';
  document.getElementById('task-edit-weight').value=t.weight||3;
  document.getElementById('task-fb').textContent='';
  document.getElementById('modal-task').classList.remove('hidden');
}
async function saveTaskEdit(){
  var name=(document.getElementById('task-edit-name').value||'').trim();
  var desc=(document.getElementById('task-edit-desc').value||'').trim();
  var date=document.getElementById('task-edit-date').value;
  var weight=parseInt(document.getElementById('task-edit-weight').value)||3;
  var fb=document.getElementById('task-fb');
  if(!name){fb.textContent='Nom requis';fb.style.color='#dc2626';return;}
  var res=await sb.from('tasks').update({name:name,description:desc,due_date:date||null,weight:weight}).eq('id',editTaskId);
  if(res.error){fb.textContent='Erreur: '+res.error.message;fb.style.color='#dc2626';return;}
  var t=tasks.find(function(t){return t.id===editTaskId;});
  if(t){t.name=name;t.description=desc;t.due_date=date||null;t.weight=weight;}
  closeModal('modal-task'); renderStepsTab();
}

// ── GOAL MODAL ──
function openGoalModal(goalId,presetQuality){
  editGoalId=goalId||null;
  var goal=goalId?goals.find(function(g){return g.id===goalId;}):null;
  var sel=document.getElementById('goal-quality');
  sel.innerHTML=ALL_QUALITIES.map(function(item){return '<option value="'+item.quality.replace(/"/g,'&quot;')+'">'+item.horizon.label+' — '+esc(item.quality)+'</option>';}).join('');
  if(goal){
    document.getElementById('modal-goal-title').textContent="Modifier l'objectif";
    document.getElementById('goal-name').value=goal.name;
    document.getElementById('goal-definition').value=goal.definition||'';
    sel.value=goal.quality;
  } else {
    document.getElementById('modal-goal-title').textContent='Nouvel objectif';
    document.getElementById('goal-name').value='';
    document.getElementById('goal-definition').value='';
    if(presetQuality) sel.value=presetQuality;
  }
  document.getElementById('goal-fb').textContent='';
  document.getElementById('modal-goal').classList.remove('hidden');
  setTimeout(function(){document.getElementById('goal-name').focus();},100);
}
async function saveGoal(){
  var name=(document.getElementById('goal-name').value||'').trim();
  var quality=document.getElementById('goal-quality').value;
  var definition=(document.getElementById('goal-definition').value||'').trim();
  var fb=document.getElementById('goal-fb');
  if(!name){fb.textContent='Nom requis';fb.style.color='#dc2626';return;}
  if(editGoalId){
    var res=await sb.from('goals').update({name:name,quality:quality,definition:definition}).eq('id',editGoalId);
    if(res.error){fb.textContent='Erreur: '+res.error.message;fb.style.color='#dc2626';return;}
    var g=goals.find(function(g){return g.id===editGoalId;});
    if(g){g.name=name;g.quality=quality;g.definition=definition;}
  } else {
    var res2=await sb.from('goals').insert({name:name,quality:quality,definition:definition}).select().single();
    if(res2.error){fb.textContent='Erreur: '+res2.error.message;fb.style.color='#dc2626';return;}
    goals.push(res2.data);
  }
  closeModal('modal-goal'); renderHome();
}

// ── DELETE ──
function confirmDelete(type,id,label){
  var msgs={
    goal:'Supprimer "<strong>'+esc(label)+'</strong>" et toutes ses étapes et tâches ?',
    step:'Supprimer l\'étape "<strong>'+esc(label)+'</strong>" et toutes ses tâches ?',
    task:'Supprimer la tâche "<strong>'+esc(label)+'</strong>" ?'
  };
  document.getElementById('confirm-msg').innerHTML=msgs[type]||'Confirmer la suppression ?';
  document.getElementById('confirm-ok').onclick=function(){doDelete(type,id);};
  document.getElementById('modal-confirm').classList.remove('hidden');
}
async function doDelete(type,id){
  closeModal('modal-confirm');
  if(type==='goal'){
    var goalStepIds=steps.filter(function(s){return s.goal_id===id;}).map(function(s){return s.id;});
    if(goalStepIds.length) await sb.from('tasks').delete().in('step_id',goalStepIds);
    await sb.from('steps').delete().eq('goal_id',id);
    await sb.from('goals').delete().eq('id',id);
    goals=goals.filter(function(g){return g.id!==id;});
    steps=steps.filter(function(s){return s.goal_id!==id;});
    tasks=tasks.filter(function(t){return goalStepIds.indexOf(t.step_id)<0;});
    renderHome();
  } else if(type==='step'){
    await sb.from('tasks').delete().eq('step_id',id);
    await sb.from('steps').delete().eq('id',id);
    steps=steps.filter(function(s){return s.id!==id;});
    tasks=tasks.filter(function(t){return t.step_id!==id;});
    renderStepsTab();
  } else {
    await sb.from('tasks').delete().eq('id',id);
    tasks=tasks.filter(function(t){return t.id!==id;});
    renderStepsTab();
  }
}

// ── NAV ──
function goHome(){
  document.getElementById('screen-detail').classList.remove('active');
  document.getElementById('screen-home').classList.add('active');
  document.getElementById('nav-back').classList.remove('visible');
  document.getElementById('btn-add-goal').style.display='';
  currentGoal=null; renderHome();
}
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  if(btn) btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}
function closeModal(id){document.getElementById(id).classList.add('hidden');}

// ── INIT ──
renderHome();
</script>
